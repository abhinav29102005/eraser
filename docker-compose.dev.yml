version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumo_postgres
    environment:
      POSTGRES_USER: lumo
      POSTGRES_PASSWORD: lumo_password
      POSTGRES_DB: lumo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumo_network

  redis:
    image: redis:7-alpine
    container_name: lumo_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumo_network

volumes:
  postgres_data:

networks:
  lumo_network:
    driver: bridge
