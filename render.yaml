# ─── Render Blueprint ───
# Deploy: https://dashboard.render.com/blueprints → New Blueprint Instance → connect this repo
#
# This creates:
#   1. PostgreSQL database (free 90 days)
#   2. Backend web service (Docker, free tier)
#
# DATABASE_URL is auto-wired from the DB to the web service.
# You only need to paste OPENAI_API_KEY in the dashboard after deploy.

databases:
  - name: lumo-db
    plan: free
    databaseName: lumo_db
    user: lumo
    region: oregon

services:
  - type: web
    name: lumo-api-mlsc
    runtime: docker
    repo: https://github.com/abhinav29102005/eraser
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "10000"
